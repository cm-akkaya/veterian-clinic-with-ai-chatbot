# Bu dosya Jenkins pipeline tarafından kullanılır.
# Image'ları springcommunity yerine Harbor'dan çeker.
# Kullanım: IMAGE_TAG=42 HARBOR_FQDN=185.32.14.7 HARBOR_PROJECT=ngn docker compose -f docker-compose.harbor.yml up -d

services:
  config-server:
    image: ${HARBOR_FQDN}/ngn/spring-petclinic-config-server:${IMAGE_TAG}
    container_name: config-server
    restart: unless-stopped
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://config-server:8888"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - 8888:8888

  discovery-server:
    image: ${HARBOR_FQDN}/ngn/spring-petclinic-discovery-server:${IMAGE_TAG}
    container_name: discovery-server
    restart: unless-stopped
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://discovery-server:8761"]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      config-server:
        condition: service_healthy
    ports:
      - 8761:8761

  customers-service:
    image: ${HARBOR_FQDN}/ngn/spring-petclinic-customers-service:${IMAGE_TAG}
    container_name: customers-service
    restart: unless-stopped
    mem_limit: 512m
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-server/petclinic?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=petclinic
      - SPRING_SQL_INIT_MODE=always
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      mysql-server:
        condition: service_healthy
    ports:
      - 8081:8081

  visits-service:
    image: ${HARBOR_FQDN}/ngn/spring-petclinic-visits-service:${IMAGE_TAG}
    container_name: visits-service
    restart: unless-stopped
    mem_limit: 512m
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-server/petclinic?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=petclinic
      - SPRING_SQL_INIT_MODE=always
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      mysql-server:
        condition: service_healthy
    ports:
      - 8082:8082

  vets-service:
    image: ${HARBOR_FQDN}/ngn/spring-petclinic-vets-service:${IMAGE_TAG}
    container_name: vets-service
    restart: unless-stopped
    mem_limit: 512m
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-server/petclinic?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=petclinic
      - SPRING_SQL_INIT_MODE=always
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      mysql-server:
        condition: service_healthy
    ports:
      - 8083:8083

  genai-service:
    image: ${HARBOR_FQDN}/ngn/spring-petclinic-genai-service:${IMAGE_TAG}
    container_name: genai-service
    restart: unless-stopped
    mem_limit: 512m
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AZURE_OPENAI_KEY=${AZURE_OPENAI_KEY}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - 8084:8084

  api-gateway:
    image: ${HARBOR_FQDN}/ngn/spring-petclinic-api-gateway:${IMAGE_TAG}
    container_name: api-gateway
    restart: unless-stopped
    mem_limit: 512m
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - 8080:8080

  tracing-server:
    image: openzipkin/zipkin:latest
    container_name: tracing-server
    restart: unless-stopped
    mem_limit: 512m
    ports:
      - 9411:9411

  admin-server:
    image: ${HARBOR_FQDN}/ngn/spring-petclinic-admin-server:${IMAGE_TAG}
    container_name: admin-server
    restart: unless-stopped
    mem_limit: 512m
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - 9090:9090

  grafana-server:
    image: ${HARBOR_FQDN}/ngn/spring-petclinic-grafana-server:${IMAGE_TAG}
    container_name: grafana-server
    restart: unless-stopped
    mem_limit: 256m
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - 3030:3000

  prometheus-server:
    image: ${HARBOR_FQDN}/ngn/spring-petclinic-prometheus-server:${IMAGE_TAG}
    container_name: prometheus-server
    restart: unless-stopped
    mem_limit: 256m
    volumes:
      - prometheus_data:/prometheus
    ports:
      - 9091:9090

  mysql-server:
    image: mysql:8.4.5
    container_name: mysql-server
    restart: unless-stopped
    mem_limit: 512m
    environment:
      MYSQL_ROOT_PASSWORD: petclinic
      MYSQL_DATABASE: petclinic
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppetclinic"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - 3306:3306

volumes:
  mysql_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

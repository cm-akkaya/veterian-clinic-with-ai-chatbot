# =============================================================================
# 05-app-services.yaml
# customers-service, visits-service, vets-service
# Hepsi config-server, discovery-server ve mysql-server'a bağımlı
# =============================================================================

---
# ── Customers Service ──────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customers-service
  namespace: petclinic
  labels:
    app: customers-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: customers-service
  template:
    metadata:
      labels:
        app: customers-service
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      initContainers:
        - name: wait-for-infra
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              until curl -sf http://config-server:8888/actuator/health && \
                    curl -sf http://discovery-server:8761/actuator/health; do
                echo "Infrastructure beklenıyor..."; sleep 5;
              done
      containers:
        - name: customers-service
          image: 185.32.14.7/ngn/spring-petclinic-customers-service:IMAGE_TAG
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker,mysql"
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: SPRING_DATASOURCE_PASSWORD
            - name: SPRING_SQL_INIT_MODE
              value: "always"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: customers-service
  namespace: petclinic
  labels:
    app: customers-service
spec:
  selector:
    app: customers-service
  ports:
    - port: 8081
      targetPort: 8081


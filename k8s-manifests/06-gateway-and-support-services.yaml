---
# ── Tracing Server (Zipkin) ────────────────────────────────────────────────────
# In-memory, PV yok (tasarım gereği)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracing-server
  namespace: petclinic
  labels:
    app: tracing-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tracing-server
  template:
    metadata:
      labels:
        app: tracing-server
    spec:
      containers:
        - name: zipkin
          image: openzipkin/zipkin:latest
          ports:
            - containerPort: 9411
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"

---
apiVersion: v1
kind: Service
metadata:
  name: tracing-server
  namespace: petclinic
  labels:
    app: tracing-server
spec:
  selector:
    app: tracing-server
  ports:
    - port: 9411
      targetPort: 9411

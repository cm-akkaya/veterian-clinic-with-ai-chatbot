# =============================================================================
# 01-configmap-and-secrets.yaml
# Uygulama genelinde paylaşılan env değerleri ve hassas veriler
# =============================================================================

---
# MySQL bağlantı bilgileri — Spring servislerine inject edilir
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: petclinic
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "petclinic"
  MYSQL_DATABASE: "petclinic"
  SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-server:3306/petclinic?allowPublicKeyRetrieval=true&useSSL=false"
  SPRING_DATASOURCE_USERNAME: "root"
  SPRING_DATASOURCE_PASSWORD: "petclinic"

---
# genai-service için OpenAI key — şimdilik dummy, gerçek key gelince güncelle:
#   kubectl create secret generic genai-secret \
#     --namespace=petclinic \
#     --from-literal=SPRING_AI_OPENAI_API_KEY='sk-...' \
#     --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: genai-secret
  namespace: petclinic
type: Opaque
stringData:
  SPRING_AI_OPENAI_API_KEY: "sk-dummy-key-replace-with-real"
  OPENAI_API_KEY: "sk-dummy-key-replace-with-real"

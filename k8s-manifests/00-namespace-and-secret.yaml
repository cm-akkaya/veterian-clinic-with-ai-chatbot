# =============================================================================
# 00-namespace-and-secret.yaml
# ÖNCE bu dosyayı uygula:
#   kubectl apply -f 00-namespace-and-secret.yaml
#
# Ardından Harbor imagePullSecret'ı oluştur (robot account şifren gerekli):
#   kubectl create secret docker-registry harbor-pull-secret \
#     --namespace=petclinic \
#     --docker-server=185.32.14.7 \
#     --docker-username='robot$ngn+ngn-list-robot' \
#     --docker-password='<ROBOT_ACCOUNT_SIFREN>' \
#     --docker-email=admin@petclinic.local
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: petclinic
  labels:
    app.kubernetes.io/part-of: veterian-clinic-with-ai-chatbot
